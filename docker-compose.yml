name: heimdall

# web and worker share one image (built once, reused).
x-heimdall-build: &heimdall-build
  context: .
  dockerfile: deploy/Dockerfile

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build: *heimdall-build
    image: heimdall:latest
    restart: unless-stopped
    command:
      ["uvicorn", "--factory", "heimdall.app:create_app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379
    # Published on loopback so the signed-webhook replay helper can reach /webhook
    # directly during dogfooding; in production Caddy fronts it over TLS.
    ports:
      - "127.0.0.1:8000:8000"
    secrets:
      - github_app_private_key
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: *heimdall-build
    image: heimdall:latest
    restart: unless-stopped
    command: ["heimdall-worker"]
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: sqlite+aiosqlite:////data/heimdall.db
    # The lens sandbox uses bwrap's unprivileged user-namespace path (no setuid, no added
    # capabilities).  Three of Docker's default confinements block it, so all three are lifted
    # for the worker alone (web/redis/caddy never run the sandbox):
    #   - seccomp=unconfined     — the default seccomp profile blocks user-namespace creation.
    #   - systempaths=unconfined — the default masks /proc, blocking bwrap's fresh /proc mount.
    #   - apparmor=unconfined    — on AppArmor hosts (Debian/Ubuntu) the default docker-default
    #                              profile denies the mount ops bwrap needs ("Failed to make /
    #                              slave"); seccomp=unconfined does NOT lift AppArmor.  Harmless
    #                              no-op on hosts without AppArmor.
    # The worker's startup exec-probe fails the boot if any of these is missing.
    security_opt:
      - seccomp=unconfined
      - systempaths=unconfined
      - apparmor=unconfined
    volumes:
      - worker_data:/data
      # Shared OAuth credentials, mounted READ-ONLY: the worker process never writes them
      # and the lens sandbox re-binds this same path read-only on top (defence in depth).
      # Empty/unused in the default API-key mode; populated by claude-refresher under the
      # `oauth` profile.
      - claude_creds:/home/heimdall/.claude:ro
    secrets:
      - github_app_private_key
    depends_on:
      redis:
        condition: service_healthy

  # Opt-in OAuth (subscription) token refresher — only started with the `oauth` profile
  # (`docker compose --profile oauth up -d`).  OAuth access tokens expire after hours and
  # the claude CLI refreshes them by rewriting ~/.claude/.credentials.json — a write the
  # worker's lens sandbox blocks by design.  This sidecar shares that ~/.claude via the
  # claude_creds volume mounted READ-WRITE, and periodically fires a throwaway `claude -p`
  # ping (heimdall-refresh) that refreshes/rotates the token as a side effect.  It runs no
  # untrusted PR code, so write access is safe, and it makes no GitHub calls, so it is given
  # NONE of the App secrets — only its two CLAUDE_REFRESH_* knobs.  See
  # docs/self-hosting.md "Docker deployment" → OAuth section for the one-time credential seed.
  claude-refresher:
    build: *heimdall-build
    image: heimdall:latest
    restart: unless-stopped
    profiles: ["oauth"]
    command: ["heimdall-refresh"]
    environment:
      CLAUDE_REFRESH_MODEL: ${CLAUDE_REFRESH_MODEL:-haiku}
      CLAUDE_REFRESH_INTERVAL_SECONDS: ${CLAUDE_REFRESH_INTERVAL_SECONDS:-1800}
    volumes:
      - claude_creds:/home/heimdall/.claude

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env for automatic HTTPS}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  redis_data:
  worker_data:
  # Shared ~/.claude for OAuth (subscription) auth: written by claude-refresher, read by
  # the worker.  Seeded once on a fresh host (see docs/self-hosting.md "Docker deployment" → OAuth).
  claude_creds:
  caddy_data:
  caddy_config:

secrets:
  github_app_private_key:
    file: ./secrets/github_app_private_key.pem
