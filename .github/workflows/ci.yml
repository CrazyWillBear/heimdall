name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

# Mirror Heimdall's own "cancel stale job on new push": a newer push/PR-sync on
# the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  done-check:
    name: done-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest (with coverage)
        run: uv run pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          # Resolves for same-repo runs; empty (tokenless OIDC) on fork PRs.
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docker:
    name: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Only authenticate when we actually push (push to main). Skipped on PRs.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          # amd64-only on PRs (fast); both arches on push to main (publish channel).
          platforms: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/crazywillbear/heimdall:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
